name: Publish to NPM

on:
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

permissions:
  contents: read # Explicitly only allow the workflow to read the repository code

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v7
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Setup Node.js for publishing
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish bungres-orm
        working-directory: ./packages/bungres-orm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish bungres-kit
        working-directory: ./packages/bungres-kit
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
